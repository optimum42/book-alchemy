<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} - Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-indigo-600 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight">📚 My Digital Library</h1>
        <a href="/" class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded transition-colors text-sm font-medium">← Back to Library</a>
      </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 py-12">
      <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 w-full max-w-2xl flex flex-col sm:flex-row gap-8">

        <div class="flex-shrink-0 flex justify-center">
            <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-L.jpg"
                 alt="Cover of {{ book.title }}"
                 class="w-48 h-72 object-cover rounded-lg shadow-md bg-slate-100">
        </div>

        <div class="flex flex-col justify-center">
            <h2 class="text-3xl font-bold text-slate-900 mb-2">{{ book.title }}</h2>

            <p class="text-lg text-slate-600 mb-6">
                By <a href="/author/{{ book.author_id }}" class="text-indigo-600 hover:text-indigo-800 font-semibold hover:underline">{{ book.author.name }}</a>
            </p>

            <div class="space-y-3 bg-slate-50 p-4 rounded-lg border border-slate-100">
                <p><strong>ISBN:</strong> <span class="text-slate-600">{{ book.isbn }}</span></p>
                <p><strong>Published:</strong> <span class="text-slate-600">{{ book.publication_year if book.publication_year else 'Unknown' }}</span></p>
            </div>

            <form action="/book/{{ book.id }}/delete" method="POST" class="mt-8">
                <button type="submit"
                        class="text-sm font-semibold text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 px-4 py-2 rounded transition-colors"
                        onclick="return confirm('Are you sure you want to delete this book?');">
                  Delete Book
                </button>
            </form>
        </div>

      </div>
    </main>

  </body>
</html>
