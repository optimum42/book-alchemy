{% extends "base.html" %}

{% block title %}Add a Book{% endblock %}

{% block content %}

<main class="flex-grow flex items-center justify-center p-4 py-12">
  <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 w-full max-w-lg">

    <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">Add a New Author</h2>

    {% if message %}
      <div class="mb-6 bg-emerald-100 border-l-4 border-emerald-500 text-emerald-800 p-4 rounded shadow-sm" role="alert">
        <p>{{ message }}</p>
      </div>
    {% endif %}

    <form action="/add_author" method="POST" class="space-y-5">

      <div>
        <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Author Name:</label>
        <input type="text" id="name" name="name" required
               class="w-full border border-slate-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
      </div>

      <div>
        <label for="birth_date" class="block text-sm font-medium text-slate-700 mb-1">Birthdate:</label>
        <input type="date" id="birth_date" name="birth_date" required
               class="w-full border border-slate-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer">
      </div>

      <div>
        <label for="date_of_death" class="block text-sm font-medium text-slate-700 mb-1">Date of Death:</label>
        <input type="date" id="date_of_death" name="date_of_death"
               class="w-full border border-slate-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer">
      </div>

      <div class="pt-2">
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-4 rounded-md transition-colors shadow-sm">
          Add Author
        </button>
      </div>

    </form>

  </div>
</main>

{% endblock %}
