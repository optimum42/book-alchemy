<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}My Book Library{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-indigo-600 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <a href="/">
            <h1 class="text-2xl font-bold tracking-tight hover:text-indigo-200 transition-colors">📚 My Digital Library</h1>
        </a>
        <div class="flex gap-4">
          {% block nav_buttons %}
            <a href="/" class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded transition-colors text-sm font-medium">← Back to Library</a>
          {% endblock %}
        </div>
      </div>
    </nav>

    {% block content %}
    {% endblock %}

  </body>
</html>
